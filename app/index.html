<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trading Copilot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F1117; --surface: #1A1D27; --border: #2A2D37;
      --text: #E5E7EB; --text-dim: #9CA3AF; --accent: #3B82F6;
      --accent-bg: rgba(59,130,246,0.1); --user-bg: #1E3A5F;
      --green: #10B981; --red: #EF4444;
      --system-bg: rgba(245,158,11,0.08); --system-text: #F59E0B;
    }

    body {
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      display: flex; align-items: center; padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .header h1 {
      font-size: 1rem; font-weight: 600;
      background: linear-gradient(135deg, #3B82F6, #10B981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

    .hdr-btn {
      padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-dim); font-size: 0.75rem; cursor: pointer;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

    .messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 1rem;
    }

    .msg {
      max-width: 85%; padding: 0.75rem 1rem; border-radius: 12px;
      font-size: 0.9rem; line-height: 1.65; word-wrap: break-word; white-space: pre-wrap;
    }
    .msg.user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 4px; }
    .msg.assistant {
      align-self: flex-start; background: var(--surface); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; max-width: 92%;
    }
    .msg.system {
      align-self: center; background: var(--system-bg); color: var(--system-text);
      font-size: 0.8rem; text-align: center; padding: 0.5rem 1rem; border-radius: 8px;
    }
    .msg.welcome {
      align-self: center; text-align: center; background: transparent;
      color: var(--text-dim); font-size: 0.85rem; padding: 2rem 1rem; max-width: 420px;
    }
    .msg.assistant.streaming::after {
      content: '\u2588'; animation: blink 0.8s infinite; color: var(--accent);
    }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

    /* Markdown rendered content */
    .msg.assistant { white-space: normal; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
      margin: 0.8rem 0 0.4rem; font-size: 1rem; color: var(--text);
    }
    .msg.assistant h1 { font-size: 1.1rem; }
    .msg.assistant h2 { font-size: 1rem; }
    .msg.assistant h3 { font-size: 0.95rem; color: var(--accent); }
    .msg.assistant p { margin: 0.3rem 0; line-height: 1.65; }
    .msg.assistant ul, .msg.assistant ol { margin: 0.3rem 0 0.3rem 1.2rem; }
    .msg.assistant li { margin: 0.15rem 0; }
    .msg.assistant strong { color: #F9FAFB; }
    .msg.assistant em { color: var(--text-dim); }
    .msg.assistant code {
      background: rgba(255,255,255,0.06); padding: 0.1rem 0.35rem;
      border-radius: 4px; font-size: 0.82rem; font-family: ui-monospace, monospace;
    }
    .msg.assistant pre {
      background: rgba(0,0,0,0.3); border-radius: 6px; padding: 0.6rem;
      overflow-x: auto; margin: 0.4rem 0;
    }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant table {
      width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.82rem;
    }
    .msg.assistant th {
      text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border);
      color: var(--text-dim); font-weight: 600;
    }
    .msg.assistant td {
      padding: 0.35rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .msg.assistant tr:hover td { background: rgba(255,255,255,0.02); }
    .msg.assistant hr { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }
    .msg.assistant blockquote {
      border-left: 3px solid var(--accent); padding-left: 0.8rem;
      color: var(--text-dim); margin: 0.4rem 0;
    }
    .msg.assistant a { color: var(--accent); text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }

    /* Onboarding */
    .onboarding { max-width: 380px; align-self: center; padding: 1.5rem; }
    .ob-option {
      display: block; width: 100%; padding: 0.6rem 0.9rem; margin-bottom: 0.5rem;
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
      color: var(--text); font-size: 0.85rem; cursor: pointer; text-align: left;
    }
    .ob-option:hover { border-color: var(--accent); background: var(--accent-bg); }
    .ob-input {
      width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 0.85rem; margin-bottom: 0.5rem;
      outline: none;
    }
    .ob-input:focus { border-color: var(--accent); }

    .quick-actions {
      display: flex; gap: 0.5rem; padding: 0.5rem 1rem; overflow-x: auto;
      flex-shrink: 0; -webkit-overflow-scrolling: touch;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .quick-btn {
      white-space: nowrap; padding: 0.45rem 0.9rem; border: 1px solid var(--border);
      border-radius: 20px; background: transparent; color: var(--text-dim);
      font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    .input-area {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1; border: 1px solid var(--border); border-radius: 10px;
      padding: 0.6rem 0.9rem; font-size: 0.9rem; resize: none; font-family: inherit;
      outline: none; background: var(--surface); color: var(--text);
      min-height: 42px; max-height: 120px;
    }
    .input-area textarea::placeholder { color: var(--text-dim); }
    .input-area textarea:focus { border-color: var(--accent); }
    .send-btn {
      width: 42px; height: 42px; border: none; border-radius: 10px;
      background: var(--accent); color: white; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Settings modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 400px;
    }
    .modal h3 { margin-bottom: 0.75rem; font-size: 1rem; }
    .modal label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; margin-top: 0.75rem; }
    .modal input, .modal select {
      width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: 0.85rem; outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .modal-actions button { padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border) !important; }
    .btn-danger { background: var(--red); color: white; }

    @media (max-width: 640px) { .msg { max-width: 95%; } .msg.assistant { max-width: 98%; } }
  </style>
</head>
<body>

  <div class="header">
    <h1>Trading Copilot</h1>
    <div class="header-right">
      <button class="hdr-btn" id="settingsBtn">Settings</button>
      <button class="hdr-btn" id="newChatBtn">New Chat</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-actions">
    <button class="quick-btn" data-prompt="今天市场有什么重要的事情？帮我做一个快速复盘：大盘表现、热点板块、重要新闻。">📊 今日热点</button>
    <button class="quick-btn" data-prompt="帮我检查一下我的持仓情况，有没有需要注意的风险信号？">💼 我的持仓</button>
    <button class="quick-btn" data-prompt="根据当前市场环境，帮我找几只值得关注的股票。先问我偏好什么风格。">🔍 帮我选股</button>
    <button class="quick-btn" data-prompt="给我一个综合策略建议：当前市场环境怎么样？我应该进攻还是防守？确信度评分是多少？">🎯 策略建议</button>
    <button class="quick-btn" data-prompt="请做一次完整的 A 股复盘：涨停板分析、板块强弱、轮动信号、热门概念、异常信号。">🇨🇳 A股复盘</button>
    <button class="quick-btn" data-prompt="本周有哪些重要公司发布财报？帮我标注值得重点关注的。">📅 财报日历</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="输入你的交易想法..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h3>Settings</h3>
      <label>AI Provider</label>
      <select id="providerSelect">
        <option value="minimax">MiniMax (Free)</option>
        <option value="anthropic">Anthropic Claude (BYOK)</option>
      </select>
      <div id="apiKeySection" style="display:none">
        <label>Anthropic API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      </div>
      <label>Your Name</label>
      <input type="text" id="profileName" placeholder="e.g. Park" />
      <label>Trading Style</label>
      <select id="profileStyle">
        <option value="">Select...</option>
        <option value="growth">Growth</option>
        <option value="value">Value</option>
        <option value="momentum">Momentum</option>
        <option value="swing">Swing</option>
        <option value="macro">Macro</option>
      </select>
      <label>Markets</label>
      <select id="profileMarkets">
        <option value="us">US Stocks</option>
        <option value="ashare">A-Shares</option>
        <option value="both">Both</option>
        <option value="crypto">Crypto</option>
      </select>
      <label>Risk Tolerance</label>
      <select id="profileRisk">
        <option value="conservative">Conservative</option>
        <option value="moderate">Moderate</option>
        <option value="aggressive">Aggressive</option>
      </select>
      <div class="modal-actions">
        <button class="btn-danger" id="resetBtn">Reset</button>
        <button class="btn-secondary" id="settingsCancel">Cancel</button>
        <button class="btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var state = {
        provider: localStorage.getItem('tc_provider') || 'minimax',
        apiKey: localStorage.getItem('tc_api_key') || '',
        profile: JSON.parse(localStorage.getItem('tc_profile') || 'null'),
        history: JSON.parse(localStorage.getItem('tc_history') || '[]'),
        streaming: false,
        currentMsg: null
      };

      var messagesEl = document.getElementById('messages');
      var inputEl = document.getElementById('input');
      var sendBtn = document.getElementById('sendBtn');

      // Init
      if (!state.profile) {
        showOnboarding();
      } else {
        showWelcome();
        restoreHistory();
      }

      // Onboarding
      function showOnboarding() {
        var div = document.createElement('div');
        div.className = 'onboarding';

        var title = document.createElement('h3');
        title.textContent = 'Welcome! Tell me about yourself.';
        title.style.cssText = 'font-size:0.95rem;margin-bottom:0.75rem';
        div.appendChild(title);

        var nameInput = document.createElement('input');
        nameInput.className = 'ob-input';
        nameInput.placeholder = 'Your name';
        nameInput.id = 'obName';
        div.appendChild(nameInput);

        var hint = document.createElement('p');
        hint.textContent = 'Trading style:';
        hint.style.cssText = 'font-size:0.8rem;color:var(--text-dim);margin:0.5rem 0';
        div.appendChild(hint);

        var styles = [
          ['growth', 'Growth / 成长股'],
          ['value', 'Value / 价值投资'],
          ['momentum', 'Momentum / 动量'],
          ['swing', 'Swing / 波段'],
          ['macro', 'Macro / 宏观']
        ];

        styles.forEach(function(s) {
          var btn = document.createElement('button');
          btn.className = 'ob-option';
          btn.textContent = s[1];
          btn.setAttribute('data-style', s[0]);
          btn.addEventListener('click', function() {
            var name = document.getElementById('obName').value.trim() || 'Trader';
            state.profile = { name: name, style: s[0], markets: 'both', risk: 'moderate' };
            localStorage.setItem('tc_profile', JSON.stringify(state.profile));
            div.remove();
            showWelcome();
            addMsg('system', 'Profile saved! Analysis will be tailored to your style.');
          });
          div.appendChild(btn);
        });

        messagesEl.appendChild(div);
      }

      function showWelcome() {
        var name = state.profile ? state.profile.name : 'Trader';
        var div = document.createElement('div');
        div.className = 'msg welcome';

        var h2 = document.createElement('h2');
        h2.textContent = 'Hey ' + name + ' \uD83D\uDC4B';
        h2.style.cssText = 'font-size:1.3rem;color:var(--text);margin-bottom:0.5rem';
        div.appendChild(h2);

        var p1 = document.createElement('p');
        p1.textContent = '告诉我你的交易想法，或者点击下面的快捷按钮开始。';
        p1.style.marginBottom = '1rem';
        div.appendChild(p1);

        var p2 = document.createElement('p');
        p2.textContent = '市场研判 \u00B7 选股筛选 \u00B7 个股分析 \u00B7 财报解读 \u00B7 仓位计算 \u00B7 A股复盘';
        p2.style.cssText = 'font-size:0.75rem;color:var(--text-dim)';
        div.appendChild(p2);

        messagesEl.appendChild(div);
      }

      function restoreHistory() {
        state.history.forEach(function(m) {
          var el = addMsg(m.role, m.content);
          if (m.role === 'assistant') renderMarkdown(el, m.content);
        });
      }

      function addMsg(role, text) {
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function buildUserProfile() {
        if (!state.profile) return '';
        var p = state.profile;
        return ['Name: ' + (p.name || ''), 'Style: ' + (p.style || ''), 'Markets: ' + (p.markets || ''), 'Risk: ' + (p.risk || '')].join('\n');
      }

      function sendMessage() {
        var text = inputEl.value.trim();
        if (!text || state.streaming) return;

        addMsg('user', text);
        state.history.push({ role: 'user', content: text });
        saveHistory();
        inputEl.value = '';
        inputEl.style.height = 'auto';
        sendBtn.disabled = true;
        state.streaming = true;

        state.currentMsg = addMsg('assistant', '');
        state.currentMsg.classList.add('streaming');

        fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: state.history.slice(0, -1),
            provider: state.provider,
            api_key: state.provider === 'anthropic' ? state.apiKey : '',
            user_profile: buildUserProfile()
          })
        }).then(function(response) {
          if (!response.ok) throw new Error('API error: ' + response.status);
          var reader = response.body.getReader();
          var decoder = new TextDecoder();
          var buffer = '';
          var fullText = '';

          var renderTimer = null;

          function scheduleRender() {
            // Throttle markdown re-renders to every 300ms during streaming
            if (renderTimer) return;
            renderTimer = setTimeout(function() {
              renderTimer = null;
              if (state.currentMsg && fullText) {
                renderMarkdown(state.currentMsg, fullText);
                autoScroll();
              }
            }, 300);
          }

          function read() {
            reader.read().then(function(result) {
              if (result.done) { if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; } finish(fullText); return; }
              buffer += decoder.decode(result.value, { stream: true });
              var lines = buffer.split('\n');
              buffer = lines.pop();
              lines.forEach(function(line) {
                if (!line.startsWith('data: ')) return;
                try {
                  var data = JSON.parse(line.slice(6));
                  if (data.type === 'text') {
                    fullText += data.text;
                    scheduleRender();
                  } else if (data.type === 'done') {
                    if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }
                    finish(fullText);
                  } else if (data.type === 'error') {
                    state.currentMsg.textContent = parseError(data.error);
                    finish('');
                  }
                } catch(e) {}
              });
              read();
            }).catch(function(err) { state.currentMsg.textContent = parseError(err.message); finish(''); });
          }
          read();
        }).catch(function(err) { state.currentMsg.textContent = parseError(err.message); finish(''); });
      }

      function autoScroll() {
        // Only auto-scroll if user is near the bottom (within 150px)
        var isNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150;
        if (isNearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function parseError(raw) {
        try {
          var obj = JSON.parse(raw);
          var msg = obj.error && obj.error.message ? obj.error.message : raw;
          if (msg.indexOf('insufficient_balance') >= 0 || msg.indexOf('insufficient balance') >= 0) return 'API 余额不足，请充值或在 Settings 中切换到自己的 API Key。';
          if (msg.indexOf('invalid api key') >= 0 || msg.indexOf('authorized_error') >= 0) return 'API Key 无效，请在 Settings 中检查。';
          if (msg.indexOf('rate_limit') >= 0) return '请求太频繁，请稍后再试。';
          return msg;
        } catch(e) {
          if (raw.indexOf('Failed to fetch') >= 0) return '无法连接服务器，请确认 server.py 正在运行。';
          return raw;
        }
      }

      function renderMarkdown(el, text) {
        if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
          el.innerHTML = DOMPurify.sanitize(marked.parse(text));
        } else {
          el.textContent = text;
        }
      }

      function finish(fullText) {
        if (state.currentMsg) {
          state.currentMsg.classList.remove('streaming');
          if (fullText) {
            renderMarkdown(state.currentMsg, fullText);
            autoScroll();
          }
        }
        if (fullText) { state.history.push({ role: 'assistant', content: fullText }); saveHistory(); }
        state.currentMsg = null;
        state.streaming = false;
        sendBtn.disabled = !inputEl.value.trim();
      }

      function saveHistory() {
        localStorage.setItem('tc_history', JSON.stringify(state.history.slice(-20)));
      }

      // Input
      inputEl.addEventListener('input', function() {
        sendBtn.disabled = !inputEl.value.trim() || state.streaming;
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      });
      inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
      });
      sendBtn.addEventListener('click', sendMessage);

      // Quick actions
      document.querySelectorAll('.quick-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { inputEl.value = btn.getAttribute('data-prompt'); sendMessage(); });
      });

      // New chat
      document.getElementById('newChatBtn').addEventListener('click', function() {
        state.history = [];
        localStorage.removeItem('tc_history');
        messagesEl.textContent = '';
        showWelcome();
      });

      // Settings
      var settingsModal = document.getElementById('settingsModal');
      var providerSelect = document.getElementById('providerSelect');
      var apiKeySection = document.getElementById('apiKeySection');

      document.getElementById('settingsBtn').addEventListener('click', function() {
        providerSelect.value = state.provider;
        document.getElementById('apiKeyInput').value = state.apiKey;
        document.getElementById('profileName').value = state.profile ? state.profile.name : '';
        document.getElementById('profileStyle').value = state.profile ? state.profile.style : '';
        document.getElementById('profileMarkets').value = state.profile ? state.profile.markets : 'both';
        document.getElementById('profileRisk').value = state.profile ? state.profile.risk : 'moderate';
        apiKeySection.style.display = providerSelect.value === 'anthropic' ? 'block' : 'none';
        settingsModal.classList.add('visible');
      });

      providerSelect.addEventListener('change', function() {
        apiKeySection.style.display = providerSelect.value === 'anthropic' ? 'block' : 'none';
      });

      document.getElementById('settingsCancel').addEventListener('click', function() { settingsModal.classList.remove('visible'); });

      document.getElementById('settingsSave').addEventListener('click', function() {
        state.provider = providerSelect.value;
        state.apiKey = document.getElementById('apiKeyInput').value.trim();
        state.profile = {
          name: document.getElementById('profileName').value.trim() || 'Trader',
          style: document.getElementById('profileStyle').value,
          markets: document.getElementById('profileMarkets').value,
          risk: document.getElementById('profileRisk').value
        };
        localStorage.setItem('tc_provider', state.provider);
        localStorage.setItem('tc_api_key', state.apiKey);
        localStorage.setItem('tc_profile', JSON.stringify(state.profile));
        settingsModal.classList.remove('visible');
        addMsg('system', 'Settings saved!');
      });

      document.getElementById('resetBtn').addEventListener('click', function() {
        if (!confirm('Clear all data?')) return;
        localStorage.removeItem('tc_provider');
        localStorage.removeItem('tc_api_key');
        localStorage.removeItem('tc_profile');
        localStorage.removeItem('tc_history');
        location.reload();
      });

      settingsModal.addEventListener('click', function(e) { if (e.target === settingsModal) settingsModal.classList.remove('visible'); });
    })();
  </script>
</body>
</html>
